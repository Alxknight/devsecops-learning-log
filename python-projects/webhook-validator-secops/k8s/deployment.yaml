apiVersion: apps/v1
kind: Deployment
metadata:
  name: webhook-validator
  namespace: webhook-validator
  labels:
    app.kubernetes.io/name: webhook-validator
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: webhook-validator-secops
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: webhook-validator
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: webhook-validator
        app.kubernetes.io/component: api
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: webhook-validator
          image: webhook-validator:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: APP_ENV
              value: "production"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: webhook-validator-secret
                  key: WEBHOOK_SECRET
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL

name: S3 Security Auditor CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "chore/**"
    paths:
      - "python-projects/auto-audit-script/**"
      - ".github/workflows/s3-auditor-ci.yml"

  pull_request:
    branches:
      - main
    paths:
      - "python-projects/auto-audit-script/**"
      - ".github/workflows/s3-auditor-ci.yml"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Run S3 auditor tests
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: python-projects/auto-audit-script

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            python-projects/auto-audit-script/requirements.txt
            python-projects/auto-audit-script/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: python -m pytest -v
